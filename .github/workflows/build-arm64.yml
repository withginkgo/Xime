name: Build arm64-v8a APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 递归拉取所有 C++ 依赖子模块（关键！）
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # 2. 自动安装 Android SDK 和 NDK
      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK & CMake
        run: |
          ${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"

      # 3. 执行单架构构建，并开启错误堆栈跟踪
      - name: Build arm64-v8a Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease -Pandroid.injected.build.abi=arm64-v8a --stacktrace

      # 4. 上传构建好的 APK
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Xime-arm64-v8a-APK
          path: app/build/outputs/apk/**/*.apk
