name: Build arm64-v8a APK

on:
  workflow_dispatch: # 允许在 GitHub Actions 页面手动点击触发构建

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive # 必须递归拉取 Rime 等依赖子模块

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build arm64-v8a Release APK
        run: |
          chmod +x gradlew
          # -Pandroid.injected.build.abi=arm64-v8a 强制 NDK 仅编译 arm64 架构，省时大幅缩短构建耗时
          ./gradlew assembleRelease -Pandroid.injected.build.abi=arm64-v8a

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Xime-arm64-v8a-APK
          path: app/build/outputs/apk/**/*.apk
