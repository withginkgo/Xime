# Rime schema
# encoding: utf-8

schema:
  schema_id: handwriting
  name: 手写输入
  version: "1.0"
  author:
    - Xime
  description: |
    手写汉字识别输入
  dependencies:
    - wubi86

switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 英文 ]
  - name: full_shape
    states: [ 半角, 全角 ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator
  filters:
    - uniquifier

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"

translator:
  dictionary: wubi86
  enable_user_dict: false
  enable_sentence: false
  enable_completion: false
  enable_encoder: false
  encode_commit_history: false

punctuator:
  import_preset: default

key_binder:
  import_preset: default

recognizer:
  import_preset: default

menu:
  page_size: 5
