# Rime schema
# encoding: utf-8
# T9 拼音九键（与 pinyin_simp 共享字典）

schema:
  schema_id: t9_pinyin
  name: 拼音九键
  version: "1.0"
  description: |
    拼音九键方案，使用 ABC/DEF/GHI/JKL/MNO/PQRS/TUV/WXYZ 键位

engine:
  processors:
    - ascii_composer
    - speller
    - punctuator
    - selector
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - echo_translator
    - script_translator

speller:
  alphabet: "abcdefghijklmnopqrstuvwxyz"
  delimiter: "''"

translator:
  dictionary: pinyin_simp
  prism: t9_pinyin
  preedit_format:
    - xlit/ABCDEFGHIJKLMNOPQRSTUVWXYZ/abcdefghijklmnopqrstuvwxyz/

x_keyboard_layouts:
  - id: ninekey
    name: 拼音九键

punctuator:
  import_preset: default

recognizer:
  patterns:
    punct: "^/([0-9]|10|[A-Za-z]*?)$"
