# Rime schema
# encoding: utf-8
# T9 拼音九键（与 pinyin_simp 共享字典）
# 参考雾凇拼音方案：数字序列直接由 RIME speller algebra 展开，
# 引擎原生处理数字→拼音转换和多音节歧义消解。
# 左侧候选区由 Kotlin T9PinyinMap 计算展示。

schema:
  schema_id: t9_pinyin
  name: 拼音九键
  version: "2.0"
  description: |
    拼音九键方案，使用 ABC/DEF/GHI/JKL/MNO/PQRS/TUV/WXYZ 键位

# 开关
switches:
  - name: ascii_mode
    reset: 0
    states: [ 中文, 西文 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: ascii_punct
    states: [ 。，, ．， ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
  filters:
    - lua_filter@*t9_preedit
    - lua_filter@*date_hint
    - uniquifier

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba9876543210
  initials: zyxwvutsrqponmlkjihgfedcba9876543210
  delimiter: " '"
  algebra:
    # 简拼规则
    - abbrev/^([a-z]).+$/$1/
    - abbrev/^([zcs]h).+$/$1/
    # 拼音容错规则
    - derive/^([nl])ve$/$1ue/
    - derive/^([jqxy])u/$1v/
    - derive/un$/uen/
    - derive/ui$/uei/
    - derive/iu$/iou/
    - derive/([aeiou])ng$/$1gn/
    - derive/([dtngkhrzcs])o(u|ng)$/$1o/
    - derive/ong$/on/
    - derive/ao$/oa/
    - derive/([iu])a(o|ng?)$/a$1$2/
    # 九宫格数字映射（derive 创建双向映射：数字↔字母）
    - derive/[abc]/2/
    - derive/[def]/3/
    - derive/[hgi]/4/
    - derive/[jkl]/5/
    - derive/[omn]/6/
    - derive/[pqrs]/7/
    - derive/[tuv]/8/
    - derive/[wxyz]/9/

translator:
  dictionary: pinyin_simp
  prism: t9_pinyin
  spelling_hints: 100
  comment_format: []
  preedit_format:
    - xlit/ABCDEFGHIJKLMNOPQRSTUVWXYZ/abcdefghijklmnopqrstuvwxyz/

punctuator:
  import_preset: default

recognizer:
  patterns:
    punct: "^/([0-9]|10|[A-Za-z]*?)$"

key_binder:
  bindings:
    - { when: has_menu, accept: 1, send: apostrophe }
