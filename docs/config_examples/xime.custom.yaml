# xime.custom.yaml - 特殊按键配置
# 导入后点击键盘工具栏菜单 →「部署方案」使配置生效
# 同时覆盖中文(qwerty)和英文(qwerty_en)两种键盘布局
#
# swipe_down 按键分布:
#   第一行 q-p: Esc、常用符号（!, @, #, $, %, ^, &, *, ( ）
#   第二行 a-l: 全选/剪切/复制/粘贴/撤销/重做、Home、End、Del
#   第三行 z-m: ↑↓←→、PgUp、PgDn、Ins
keyboard:
  qwerty:
    keys:
      # ── 第一行：功能键 ──
      q: { tap: "q", swipe_up: "1", swipe_down: { label: "Esc", send: "Escape" }, long_press: { display: "bubble", values: ["q", "Q"] } }
      w: { tap: "w", swipe_up: "2", swipe_down: { label: "!", value: "!" }, long_press: { display: "bubble", values: ["w", "W"] } }
      e: { tap: "e", swipe_up: "3", swipe_down: { label: "@", value: "@" }, long_press: { display: "bubble", values: ["e", "E", "è", "é", "ê", "ë"] } }
      r: { tap: "r", swipe_up: "4", swipe_down: { label: "#", value: "#" }, long_press: { display: "bubble", values: ["r", "R"] } }
      t: { tap: "t", swipe_up: "5", swipe_down: { label: "$", value: "$" }, long_press: { display: "bubble", values: ["t", "T"] } }
      y: { tap: "y", swipe_up: "6", swipe_down: { label: "%", value: "%" }, long_press: { display: "bubble", values: ["y", "Y", "ÿ"] } }
      u: { tap: "u", swipe_up: "7", swipe_down: { label: "^", value: "^" }, long_press: { display: "bubble", values: ["u", "U", "ù", "ú", "û", "ü"] } }
      i: { tap: "i", swipe_up: "8", swipe_down: { label: "&", value: "&" }, long_press: { display: "bubble", values: ["i", "I", "ì", "í", "î", "ï"] } }
      o: { tap: "o", swipe_up: "9", swipe_down: { label: "*", value: "*" }, long_press: { display: "bubble", values: ["o", "O", "ò", "ó", "ô", "õ", "ö", "ø"] } }
      p: { tap: "p", swipe_up: "0", swipe_down: { label: "(", value: "(" }, long_press: { display: "bubble", values: ["p", "P"] } }

      # ── 第二行：编辑快捷键 ──
      a: { tap: "a", swipe_up: "!", swipe_down: { label: "全选", send: "Control+a" }, long_press: { display: "bubble", values: ["a", "A", "à", "á", "â", "ã", "ä", "å", "æ"] } }
      s: { tap: "s", swipe_up: "@", swipe_down: { label: "剪切", send: "Control+x" }, long_press: { display: "bubble", values: ["s", "S", "ß"] } }
      d: { tap: "d", swipe_up: "#", swipe_down: { label: "复制", send: "Control+c" }, long_press: { display: "bubble", values: ["d", "D"] } }
      f: { tap: "f", swipe_up: "$", swipe_down: { label: "粘贴", send: "Control+v" }, long_press: { display: "bubble", values: ["f", "F"] } }
      g: { tap: "g", swipe_up: "%", swipe_down: { label: "撤销", send: "Control+z" }, long_press: { display: "bubble", values: ["g", "G"] } }
      h: { tap: "h", swipe_up: "^", swipe_down: { label: "重做", send: "Control+Shift+z" }, long_press: { display: "bubble", values: ["h", "H"] } }
      j: { tap: "j", swipe_up: "&", swipe_down: { label: "Home", send: "Home" }, long_press: { display: "bubble", values: ["j", "J"] } }
      k: { tap: "k", swipe_up: "(", swipe_down: { label: "End", send: "End" }, long_press: { display: "bubble", values: ["k", "K"] } }
      l: { tap: "l", swipe_up: ")", swipe_down: { label: "Del", send: "Delete" }, long_press: { display: "bubble", values: ["l", "L"] } }

      # ── 第三行：导航键 ──
      z: { tap: "z", swipe_up: "|", swipe_down: { label: "↑", send: "Up" }, long_press: { display: "bubble", values: ["z", "Z"] } }
      x: { tap: "x", swipe_up: "*", swipe_down: { label: "↓", send: "Down" }, long_press: { display: "bubble", values: ["x", "X"] } }
      c: { tap: "c", swipe_up: "\\", swipe_down: { label: "←", send: "Left" }, long_press: { display: "bubble", values: ["c", "C", "ç"] } }
      v: { tap: "v", swipe_up: "?", swipe_down: { label: "→", send: "Right" }, long_press: { display: "bubble", values: ["v", "V"] } }
      b: { tap: "b", swipe_up: "_", swipe_down: { label: "PgUp", send: "Page_Up" }, long_press: { display: "bubble", values: ["b", "B"] } }
      n: { tap: "n", swipe_up: "-", swipe_down: { label: "PgDn", send: "Page_Down" }, long_press: { display: "bubble", values: ["n", "N", "ñ"] } }
      m: { tap: "m", swipe_up: "+", swipe_down: { label: "Ins", send: "Insert" }, long_press: { display: "bubble", values: ["m", "M"] } }

  # ── 英文键盘布局（与中文保持完全一致）──
  qwerty_en:
    keys:
      # ── 第一行：功能键 ──
      q: { tap: "q", swipe_up: "1", swipe_down: { label: "Esc", send: "Escape" }, long_press: { display: "bubble", values: ["q", "Q"] } }
      w: { tap: "w", swipe_up: "2", swipe_down: { label: "!", value: "!" }, long_press: { display: "bubble", values: ["w", "W"] } }
      e: { tap: "e", swipe_up: "3", swipe_down: { label: "@", value: "@" }, long_press: { display: "bubble", values: ["e", "E"] } }
      r: { tap: "r", swipe_up: "4", swipe_down: { label: "#", value: "#" }, long_press: { display: "bubble", values: ["r", "R"] } }
      t: { tap: "t", swipe_up: "5", swipe_down: { label: "$", value: "$" }, long_press: { display: "bubble", values: ["t", "T"] } }
      y: { tap: "y", swipe_up: "6", swipe_down: { label: "%", value: "%" }, long_press: { display: "bubble", values: ["y", "Y"] } }
      u: { tap: "u", swipe_up: "7", swipe_down: { label: "^", value: "^" }, long_press: { display: "bubble", values: ["u", "U"] } }
      i: { tap: "i", swipe_up: "8", swipe_down: { label: "&", value: "&" }, long_press: { display: "bubble", values: ["i", "I"] } }
      o: { tap: "o", swipe_up: "9", swipe_down: { label: "*", value: "*" }, long_press: { display: "bubble", values: ["o", "O"] } }
      p: { tap: "p", swipe_up: "0", swipe_down: { label: "(", value: "(" }, long_press: { display: "bubble", values: ["p", "P"] } }

      # ── 第二行：编辑快捷键 ──
      a: { tap: "a", swipe_up: "!", swipe_down: { label: "全选", send: "Control+a" }, long_press: { display: "bubble", values: ["a", "A"] } }
      s: { tap: "s", swipe_up: "@", swipe_down: { label: "剪切", send: "Control+x" }, long_press: { display: "bubble", values: ["s", "S"] } }
      d: { tap: "d", swipe_up: "#", swipe_down: { label: "复制", send: "Control+c" }, long_press: { display: "bubble", values: ["d", "D"] } }
      f: { tap: "f", swipe_up: "$", swipe_down: { label: "粘贴", send: "Control+v" }, long_press: { display: "bubble", values: ["f", "F"] } }
      g: { tap: "g", swipe_up: "%", swipe_down: { label: "撤销", send: "Control+z" }, long_press: { display: "bubble", values: ["g", "G"] } }
      h: { tap: "h", swipe_up: "^", swipe_down: { label: "重做", send: "Control+Shift+z" }, long_press: { display: "bubble", values: ["h", "H"] } }
      j: { tap: "j", swipe_up: "&", swipe_down: { label: "Home", send: "Home" }, long_press: { display: "bubble", values: ["j", "J"] } }
      k: { tap: "k", swipe_up: "(", swipe_down: { label: "End", send: "End" }, long_press: { display: "bubble", values: ["k", "K"] } }
      l: { tap: "l", swipe_up: ")", swipe_down: { label: "Del", send: "Delete" }, long_press: { display: "bubble", values: ["l", "L"] } }

      # ── 第三行：导航键 ──
      z: { tap: "z", swipe_up: "|", swipe_down: { label: "↑", send: "Up" }, long_press: { display: "bubble", values: ["z", "Z"] } }
      x: { tap: "x", swipe_up: "*", swipe_down: { label: "↓", send: "Down" }, long_press: { display: "bubble", values: ["x", "X"] } }
      c: { tap: "c", swipe_up: "\\", swipe_down: { label: "←", send: "Left" }, long_press: { display: "bubble", values: ["c", "C"] } }
      v: { tap: "v", swipe_up: "?", swipe_down: { label: "→", send: "Right" }, long_press: { display: "bubble", values: ["v", "V"] } }
      b: { tap: "b", swipe_up: "_", swipe_down: { label: "PgUp", send: "Page_Up" }, long_press: { display: "bubble", values: ["b", "B"] } }
      n: { tap: "n", swipe_up: "-", swipe_down: { label: "PgDn", send: "Page_Down" }, long_press: { display: "bubble", values: ["n", "N"] } }
      m: { tap: "m", swipe_up: "+", swipe_down: { label: "Ins", send: "Insert" }, long_press: { display: "bubble", values: ["m", "M"] } }
